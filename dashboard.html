<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Dashboard — CoachTanguy</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icon-32.png" />
  <style>
    :root{ --orange:#ff5a00; --dark:#0c0c0e; --line:#e6e4e1; --muted:#8a8a8a; --bg:#f4f3f1; }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;color:#141414;background:var(--bg);height:100vh;overflow:hidden}
    .app{display:grid;grid-template-columns:minmax(420px,1fr) 1.25fr;height:100vh}
    /* ---- Éditeur ---- */
    .editor{display:flex;flex-direction:column;height:100vh;border-right:1px solid var(--line);background:#fbfbfa}
    .top{display:flex;align-items:center;gap:14px;padding:16px 22px;border-bottom:1px solid var(--line);background:#fff}
    .top h1{font-family:'Inter Tight';font-size:18px;font-weight:800}
    .top h1 b{color:var(--orange)}
    .langs{display:flex;gap:6px;margin-left:6px}
    .lang{font-size:13px;font-weight:600;padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:#fff;cursor:pointer;color:#444}
    .lang.active{background:var(--orange);color:#fff;border-color:var(--orange)}
    .lang:disabled{opacity:.45;cursor:not-allowed}
    .actions{margin-left:auto;display:flex;gap:8px}
    .btn{font-family:'Inter';font-size:13px;font-weight:600;padding:9px 16px;border-radius:10px;border:1px solid var(--line);background:#fff;cursor:pointer;transition:.15s}
    .btn:hover{border-color:#bbb}
    .btn--primary{background:var(--orange);color:#fff;border-color:var(--orange)}
    .btn--primary:hover{background:#e04d00}
    .search{padding:12px 22px;border-bottom:1px solid var(--line);background:#fff}
    .search input{width:100%;font-size:14px;padding:10px 14px;border:1px solid var(--line);border-radius:10px;background:var(--bg)}
    .search input:focus{outline:none;border-color:var(--orange)}
    .fields{flex:1;overflow-y:auto;padding:10px 0 60px}
    .group{border-bottom:1px solid var(--line)}
    .group>summary{cursor:pointer;list-style:none;padding:14px 22px;font-family:'Inter Tight';font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;background:#fff;position:sticky;top:0;z-index:1}
    .group>summary::-webkit-details-marker{display:none}
    .group>summary::before{content:"▸";color:var(--orange);transition:.2s}
    .group[open]>summary::before{transform:rotate(90deg)}
    .group__body{padding:6px 22px 18px}
    .field{margin:14px 0}
    .field label{display:block;font-size:12.5px;font-weight:600;margin-bottom:5px}
    .field .key{font-size:10.5px;color:var(--muted);font-weight:500}
    .field input,.field textarea{width:100%;font-family:'Inter';font-size:13.5px;padding:9px 12px;border:1px solid var(--line);border-radius:8px;background:#fff;resize:vertical}
    .field input:focus,.field textarea:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,90,0,.1)}
    .field.changed input,.field.changed textarea{border-color:var(--orange)}
    .hint{font-size:11px;color:var(--muted);padding:0 22px;margin-top:8px}
    /* ---- Aperçu ---- */
    .preview{display:flex;flex-direction:column;height:100vh;background:#ddd}
    .preview__bar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--dark);color:#fff;font-size:13px}
    .preview__bar .dot{width:10px;height:10px;border-radius:50%;background:#ff5f57}
    .preview__bar select{margin-left:auto;font-size:12px;padding:5px 8px;border-radius:6px;border:none}
    .preview iframe{flex:1;width:100%;border:0;background:#fff}
    .toast{position:fixed;bottom:20px;left:20px;background:var(--dark);color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;opacity:0;transform:translateY(10px);transition:.25s;pointer-events:none;z-index:10}
    .toast.show{opacity:1;transform:none}
    @media(max-width:1000px){.app{grid-template-columns:1fr}.preview{display:none}}

    /* ---- Porte (mot de passe) ---- */
    .dash-gate{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:#0c0c0e}
    .dash-gate__box{background:#fff;border-radius:18px;padding:34px 30px;width:330px;max-width:90vw;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.5)}
    .dash-gate__box h1{font-family:'Inter Tight',sans-serif;font-size:19px;font-weight:800;margin-bottom:6px}
    .dash-gate__box h1 b{color:var(--orange)}
    .dash-gate__box p{font-size:13px;color:var(--muted);margin-bottom:18px}
    .dash-gate__box input{width:100%;font-size:15px;padding:12px 14px;border:1px solid var(--line);border-radius:10px;margin-bottom:12px;background:var(--bg)}
    .dash-gate__box input:focus{outline:none;border-color:var(--orange)}
    .dash-gate__box button{width:100%;font-weight:700;font-size:14px;color:#fff;background:var(--orange);border:none;border-radius:10px;padding:13px;cursor:pointer}
    .dash-gate__err{color:#e23;font-size:12.5px;min-height:16px;margin:8px 0 0}
  </style>
</head>
<body>
  <div class="dash-gate" id="dashGate">
    <form class="dash-gate__box" id="dashGateForm">
      <h1>Coach<b>Tanguy</b> · Dashboard</h1>
      <p>Entrez le mot de passe pour accéder à l'éditeur.</p>
      <input type="password" id="dashPass" placeholder="Mot de passe" autocomplete="current-password" autofocus />
      <button type="submit">Entrer</button>
      <p class="dash-gate__err" id="dashErr"></p>
    </form>
  </div>
  <script>
    (function () {
      // ⬇️⬇️ CHANGE TON MOT DE PASSE ICI ⬇️⬇️
      var DASH_PASSWORD = "CoachTanguy2026";
      var gate = document.getElementById('dashGate');
      if (sessionStorage.getItem('dash_ok') === '1') { gate.remove(); return; }
      document.getElementById('dashGateForm').addEventListener('submit', function (e) {
        e.preventDefault();
        if (document.getElementById('dashPass').value === DASH_PASSWORD) {
          sessionStorage.setItem('dash_ok', '1'); gate.remove();
        } else {
          document.getElementById('dashErr').textContent = 'Mot de passe incorrect.';
          document.getElementById('dashPass').select();
        }
      });
    })();
  </script>
  <div class="app">
    <!-- ÉDITEUR -->
    <div class="editor">
      <div class="top">
        <h1>Coach<b>Tanguy</b> · Dashboard</h1>
        <div class="langs">
          <button class="lang active" data-lang="fr">FR</button>
          <button class="lang" data-lang="nl">NL</button>
          <button class="lang" data-lang="en">EN</button>
        </div>
        <div class="langs modes">
          <button class="lang mode active" data-mode="site">Site</button>
          <button class="lang mode" data-mode="calc">Calculateur</button>
        </div>
        <div class="actions">
          <button class="btn" id="reset">↺ Réinitialiser</button>
          <button class="btn btn--primary" id="export">⤓ Exporter</button>
        </div>
      </div>
      <div class="search"><input id="search" type="text" placeholder="Rechercher un texte…" /></div>
      <div class="fields" id="fields"></div>
      <p class="hint">Les modifications s'affichent en direct dans l'aperçu. Cliquez « Exporter » pour télécharger le fichier de contenu mis à jour, puis remplacez-le dans <code>content/</code>.</p>
    </div>
    <!-- APERÇU -->
    <div class="preview">
      <div class="preview__bar">
        <span class="dot"></span> Aperçu en direct
        <select id="page">
          <option value="index.html">Accueil</option>
          <option value="coaching-visio.html">Coaching visio</option>
          <option value="suivi-en-ligne.html">Suivi en ligne</option>
          <option value="contact.html">Contact</option>
        </select>
      </div>
      <iframe id="frame" src="index.html"></iframe>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <!-- charge le contenu des 3 langues (chacune s'enregistre dans SITE_CONTENT_ALL) -->
  <script src="content/fr.js"></script>
  <script src="content/nl.js"></script>
  <script src="content/en.js"></script>
  <!-- Dictionnaires du calculateur (FR source -> NL/EN), snapshot par langue -->
  <script src="content/calc-i18n.nl.js"></script>
  <script>window.__CALC = { nl: { dict: Object.assign({}, window.CALC_I18N), frags: Object.assign({}, window.CALC_I18N_FRAGMENTS) } };</script>
  <script src="content/calc-i18n.en.js"></script>
  <script>window.__CALC.en = { dict: Object.assign({}, window.CALC_I18N), frags: Object.assign({}, window.CALC_I18N_FRAGMENTS) };</script>
  <script>
  (function(){
    var LANG='fr';
    var DEFAULTS_ALL = JSON.parse(JSON.stringify(window.SITE_CONTENT_ALL||{}));
    function DEF(){ return DEFAULTS_ALL[LANG]||{}; }
    function homeFor(l){ return l==='fr' ? 'index.html' : l+'/index.html'; }
    function pageFor(l, file){ return l==='fr' ? file : l+'/'+file; }
    function curPageFile(){ var s=document.getElementById('page'); return s?s.value:'index.html'; }
    var work = loadWork();

    // ===== Mode Calculateur =====
    var MODE = 'site';
    var CALC_DEF = JSON.parse(JSON.stringify(window.__CALC || { nl: { dict: {}, frags: {} }, en: { dict: {}, frags: {} } }));
    var cwork = { dict: {}, frags: {} };
    function loadCalcWork(){ try{ var raw=localStorage.getItem('CALC_I18N_'+LANG); if(raw) return JSON.parse(raw); }catch(e){} return JSON.parse(JSON.stringify(CALC_DEF[LANG]||{dict:{},frags:{}})); }
    function reloadPreview(){ var f=document.getElementById('frame'); try{ f.contentWindow.location.reload(); }catch(e){ f.src=f.src; } }
    function previewSrc(){ if(MODE==='calc'){ return LANG==='fr'?'calculateur.html':LANG+'/calculateur.html'; } return pageFor(LANG, curPageFile()); }
    function renderCalc(filter){
      var host=document.getElementById('fields');
      if(LANG==='fr'){ host.innerHTML='<p class="hint" style="padding:24px 22px;line-height:1.7">Le calculateur est en <b>français</b> (texte source).<br>Passez en <b>NL</b> ou <b>EN</b> pour éditer les traductions.<br><br>Le hero (Outil gratuit / Calculateur alimentaire / sous-titre) se modifie en mode <b>Site</b> → groupe « Calculateur ».</p>'; return; }
      var groups=[ {key:'dict', title:'Calculateur · Textes', src:CALC_DEF[LANG].dict}, {key:'frags', title:'Calculateur · Repas dynamiques (aliments, unités)', src:CALC_DEF[LANG].frags} ];
      var html='';
      groups.forEach(function(g){
        var keys=Object.keys(g.src).filter(function(fr){ if(!filter) return true; var val=cwork[g.key][fr]!=null?cwork[g.key][fr]:g.src[fr]; return fr.toLowerCase().indexOf(filter)>=0 || String(val).toLowerCase().indexOf(filter)>=0; });
        if(!keys.length) return;
        html+='<details class="group" open><summary>'+g.title+' ('+keys.length+')</summary><div class="group__body">';
        keys.forEach(function(fr){
          var val=cwork[g.key][fr]!=null?cwork[g.key][fr]:g.src[fr];
          var changed=(String(g.src[fr])!==String(val))?' changed':'';
          var big=String(val).length>55;
          var ctrl=big?'<textarea data-calc="'+g.key+'" data-fr="'+esc(fr)+'" rows="2">'+esc(val)+'</textarea>':'<input data-calc="'+g.key+'" data-fr="'+esc(fr)+'" value="'+esc(val)+'" />';
          html+='<div class="field'+changed+'"><label class="key">'+esc(fr)+'</label>'+ctrl+'</div>';
        });
        html+='</div></details>';
      });
      host.innerHTML=html||'<p class="hint">Aucun résultat.</p>';
      host.querySelectorAll('[data-calc]').forEach(function(el){ el.addEventListener('input',function(){ onEditCalc(el.getAttribute('data-calc'), el.getAttribute('data-fr'), el.value, el); }); });
    }
    function onEditCalc(type,fr,val,el){
      cwork[type][fr]=val;
      el.closest('.field').classList.toggle('changed', String(CALC_DEF[LANG][type][fr])!==val);
      clearTimeout(saveTimer);
      saveTimer=setTimeout(function(){ try{ localStorage.setItem('CALC_I18N_'+LANG, JSON.stringify(cwork)); }catch(e){} reloadPreview(); },250);
    }

    var GROUPS = {
      nav:"Navigation", home:"Accueil", visio:"Coaching visio", suivi:"Suivi en ligne",
      contact:"Contact", footer:"Pied de page", stripe:"Liens de paiement Stripe",
      calc:"Calculateur (hero)"
    };
    var SUB = {
      "home.hero":"Accueil · Hero", "home.trust":"Accueil · Bandeau confiance",
      "home.services":"Accueil · Services", "home.process":"Accueil · Comment ça marche",
      "home.about":"Accueil · À propos", "home.faq":"Accueil · FAQ", "home.cta":"Accueil · Appel à l'action"
    };
    var LABELS = {
      eyebrow:"Surtitre", title:"Titre", titleHtml:"Titre (HTML)", subtitle:"Sous-titre",
      ctaPrimary:"Bouton principal", ctaSecondary:"Bouton secondaire", button:"Bouton",
      cta:"Bouton", text:"Texte", tagline:"Slogan", copyright:"Copyright",
      accueil:"Accueil", visio:"Coaching visio", suivi:"Suivi en ligne", faq:"FAQ", contact:"Contact",
      unite:"Séance à l'unité (40€)", pack4:"Pack 4 séances (140€)", pack8:"Pack 8 séances (240€)",
      initial:"Accompagnement initial (300€)", mensuel:"Suivi mensuel (150€)"
    };

    function loadWork(){
      try{var raw=localStorage.getItem('SITE_CONTENT_'+LANG); if(raw) return JSON.parse(raw);}catch(e){}
      return JSON.parse(JSON.stringify(DEF()));
    }
    function flatten(obj,prefix,out){
      out=out||[];prefix=prefix||'';
      for(var k in obj){ var p=prefix?prefix+'.'+k:k; var v=obj[k];
        if(v&&typeof v==='object'&&!Array.isArray(v)) flatten(v,p,out);
        else out.push({path:p,value:String(v)});
      } return out;
    }
    function sectionOf(path){var parts=path.split('.');return (parts[0]==='home'&&parts.length>1)?parts[0]+'.'+parts[1]:parts[0];}
    function labelOf(path){var last=path.split('.').pop();return LABELS[last]||last;}
    function setDeep(obj,path,val){var p=path.split('.');var o=obj;for(var i=0;i<p.length-1;i++){o=o[p[i]];}o[p[p.length-1]]=val;}
    function getDeep(obj,path){return path.split('.').reduce(function(a,k){return a&&a[k]!=null?a[k]:undefined;},obj);}

    function render(filter){
      if(MODE==='calc'){ return renderCalc(filter); }
      var leaves=flatten(work);
      var sections=[]; var bySection={};
      leaves.forEach(function(l){
        if(filter && (l.value.toLowerCase().indexOf(filter)<0 && l.path.toLowerCase().indexOf(filter)<0)) return;
        var s=sectionOf(l.path); if(!bySection[s]){bySection[s]=[];sections.push(s);} bySection[s].push(l);
      });
      var html='';
      sections.forEach(function(s){
        var title=SUB[s]||GROUPS[s]||s;
        html+='<details class="group" open><summary>'+title+'</summary><div class="group__body">';
        bySection[s].forEach(function(l){
          var dv=getDeep(DEF(),l.path); var changed=(dv!=null&&String(dv)!==l.value)?' changed':'';
          var big=l.value.length>55||l.value.indexOf('<')>=0||l.value.indexOf('\n')>=0;
          var ctrl=big?'<textarea data-path="'+l.path+'" rows="3">'+esc(l.value)+'</textarea>'
                      :'<input data-path="'+l.path+'" value="'+esc(l.value)+'" />';
          html+='<div class="field'+changed+'"><label>'+labelOf(l.path)+' <span class="key">'+l.path+'</span></label>'+ctrl+'</div>';
        });
        html+='</div></details>';
      });
      document.getElementById('fields').innerHTML=html||'<p class="hint">Aucun résultat.</p>';
      document.querySelectorAll('#fields [data-path]').forEach(function(el){
        el.addEventListener('input',function(){onEdit(el.getAttribute('data-path'),el.value,el);});
      });
    }
    function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

    var saveTimer;
    function onEdit(path,val,el){
      setDeep(work,path,val);
      el.closest('.field').classList.toggle('changed', String(getDeep(DEF(),path))!==val);
      clearTimeout(saveTimer);
      saveTimer=setTimeout(persistAndPreview,250);
    }
    function persistAndPreview(){
      try{localStorage.setItem('SITE_CONTENT_'+LANG,JSON.stringify(work));}catch(e){}
      var f=document.getElementById('frame');
      try{f.contentWindow.location.reload();}catch(e){f.src=f.src;}
    }

    var curFilter='';
    document.getElementById('search').addEventListener('input',function(){curFilter=this.value.trim().toLowerCase();render(curFilter);});
    document.getElementById('page').addEventListener('change',function(){document.getElementById('frame').src=pageFor(LANG, this.value);});

    // Bascule de mode (Site / Calculateur)
    document.querySelectorAll('.mode').forEach(function(btn){
      btn.addEventListener('click',function(){
        MODE=btn.getAttribute('data-mode');
        document.querySelectorAll('.mode').forEach(function(b){b.classList.toggle('active',b===btn);});
        if(MODE==='calc') cwork=loadCalcWork();
        render(curFilter);
        document.getElementById('page').style.display = (MODE==='calc')?'none':'';
        document.getElementById('frame').src=previewSrc();
        toast(MODE==='calc'?'Mode Calculateur':'Mode Site');
      });
    });

    // Bascule de langue (FR / NL / EN)
    document.querySelectorAll('.lang[data-lang]').forEach(function(btn){
      btn.addEventListener('click',function(){
        LANG=btn.getAttribute('data-lang');
        document.querySelectorAll('.lang[data-lang]').forEach(function(b){b.classList.toggle('active',b===btn);});
        work=loadWork(); if(MODE==='calc') cwork=loadCalcWork(); render(curFilter);
        document.getElementById('frame').src=previewSrc();
        toast('Langue : '+LANG.toUpperCase());
      });
    });

    function download(name,content){ var blob=new Blob([content],{type:'text/javascript'}); var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); }

    document.getElementById('reset').addEventListener('click',function(){
      if(MODE==='calc'){
        if(LANG==='fr'){ toast('Rien à réinitialiser en FR (source).'); return; }
        if(!confirm('Réinitialiser les traductions du calculateur ('+LANG.toUpperCase()+') ?'))return;
        localStorage.removeItem('CALC_I18N_'+LANG); cwork=JSON.parse(JSON.stringify(CALC_DEF[LANG])); render(curFilter); reloadPreview(); toast('Réinitialisé'); return;
      }
      if(!confirm('Réinitialiser les textes ('+LANG.toUpperCase()+') aux valeurs d\'origine ?'))return;
      localStorage.removeItem('SITE_CONTENT_'+LANG);
      work=JSON.parse(JSON.stringify(DEF())); render(curFilter); persistAndPreview(); toast('Réinitialisé');
    });
    document.getElementById('export').addEventListener('click',function(){
      if(MODE==='calc'){
        if(LANG==='fr'){ toast('Rien à exporter en FR (le calculateur source est en français).'); return; }
        var h='/* Calculateur i18n '+LANG.toUpperCase()+' — exporté via dashboard. Clé = texte FR source. */\n';
        var b='window.CALC_I18N = '+JSON.stringify(cwork.dict,null,2)+';\nwindow.CALC_I18N_FRAGMENTS = '+JSON.stringify(cwork.frags,null,2)+';\n';
        download('calc-i18n.'+LANG+'.js', h+b);
        toast('calc-i18n.'+LANG+'.js téléchargé → place-le dans content/'); return;
      }
      var header='/* ===========================================================\n   CONTENU '+LANG.toUpperCase()+' — CoachTanguy (exporté via dashboard)\n   =========================================================== */\n';
      var body='window.SITE_CONTENT = '+JSON.stringify(work,null,2)+';\n';
      download(LANG+'.js', header+body);
      toast('Fichier '+LANG+'.js téléchargé → place-le dans content/');
    });

    function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2600);}

    render('');
    persistAndPreview();
  })();
  </script>
</body>
</html>
