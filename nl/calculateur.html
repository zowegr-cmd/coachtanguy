  <style>
    /* Le calculateur occupe tout l'écran et défile nativement : la carte
       "Vos résultats" reste sticky, les onglets collent, le halo orange est en
       parallax. Le hero du site est injecté DANS le calculateur (voir calc-app)
       pour garder le même haut, tout en profitant du scroll natif. */
    html, body { height: 100%; }
    body { margin: 0; overflow: hidden; background: #0a0a0b; }
    .calc-embed { position: fixed; inset: 0; z-index: 1; }
    .calc-embed__frame { display: block; width: 100%; height: 100%; border: 0; background: #0a0a0b; }
    /* spécificité > styles.css (body.nav-over-dark .nav) pour imposer un fond lisible ;
       opacité élevée car le backdrop-filter ne floute pas le contenu de l'iframe */
    .nav { z-index: 60; }
    @media print {
      .nav { display: none !important; }
      body { overflow: visible !important; height: auto !important; }
      .calc-embed { position: static !important; }
    }
    body.nav-over-dark .nav,
    body.nav-over-dark .nav.scrolled {
      background: rgba(9, 9, 11, .94);
      -webkit-backdrop-filter: blur(16px) saturate(120%);
      backdrop-filter: blur(16px) saturate(120%);
      border-bottom: 1px solid rgba(255, 255, 255, .08);
    }
  </style>

  <!-- ===== CALCULATEUR (app intégrée, plein écran, défilement natif interne) ===== -->
  <section class="calc-embed" aria-label="Calculateur alimentaire">
    <iframe id="calcFrame" class="calc-embed__frame" src="../calculateur/index.html?v=14&lang=nl" title="Calculateur alimentaire CoachTanguy"></iframe>
  </section>

  <script src="../content/nl.js?v=2"></script>
  <script src="../assets/i18n.js?v=2"></script>

  <!-- Envoie au calculateur les textes du hero (éditables au dashboard, traduits selon la page) -->
  <script>
    (function () {
      var ifr = document.getElementById('calcFrame');
      if (!ifr) return;
      // Propage le mode aperçu au calculateur (sinon le vrai calculateur ignore le brouillon)
      if (/[?&]preview=1/.test(location.search) && ifr.src.indexOf('preview=1') < 0) {
        ifr.src = ifr.src + (ifr.src.indexOf('?') >= 0 ? '&' : '?') + 'preview=1';
      }
      function send() {
        try {
          if (window.SITE_CONTENT && window.SITE_CONTENT.calc && ifr.contentWindow) {
            ifr.contentWindow.postMessage({ __heroText: window.SITE_CONTENT.calc }, '*');
          }
        } catch (e) {}
      }
      ifr.addEventListener('load', function () { send(); var n = 0, t = setInterval(function () { send(); if (++n > 12) clearInterval(t); }, 250); });
    })();
  </script>

  <script src="../script.js?v=11" defer></script>
